# Site settings
# These are used to personalize the site. In templates they are accessed via
# {{ site.title }}, {{ site.description }}, and so on. Jekyll does NOT reload
# this file automatically — restart `bundle exec jekyll serve` after editing.

title: Dave's Code Blog
# email: david.norman.w@gmail.com   # Uncomment to show a contact email in the footer (it becomes public).
description: >- # ignores newlines until the next key
  Random thoughts about code, from David Norman.
github_username: normand1
# twitter_username: yourhandle       # Uncomment to add a Twitter/X link to the footer.

# Where the site lives. This repo publishes as a GitHub "project site", so it is
# served from a subpath. If you later move it to normand1.github.io (root) or a
# custom domain, set baseurl back to "" and update url accordingly.
url: "https://normand1.github.io"
baseurl: "/DavesCodeBlog"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed

# Exclude from processing — these are dev/build files, not site content.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - .sass-cache/
  - .jekyll-cache/
  - node_modules/
